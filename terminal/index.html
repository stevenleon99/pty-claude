<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ConPTY Terminal</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.css">
</head>
<body>

    <!-- Login overlay -->
    <div id="lock-overlay">
        <div class="lock-box">
            <div class="lock-icon">&gt;_</div>
            <input type="password" id="pw-input" placeholder="password" autofocus spellcheck="false" autocomplete="off">
            <button id="pw-btn">Unlock</button>
            <div id="pw-error" class="pw-error"></div>
        </div>
    </div>

    <!-- Toolbar -->
    <div id="toolbar">
        <div id="toolbar-left">
            <span id="shell-prompt">$_</span>
            <select id="shell-select">
                <option value="cmd">cmd</option>
                <option value="powershell">powershell</option>
                <option value="bash">bash</option>
            </select>
            <button id="btn-start" class="btn">connect</button>
            <button id="btn-stop" class="btn btn-stop" disabled>disconnect</button>
        </div>
        <div id="toolbar-center">
            <span id="status-dot"></span>
            <span id="status-text">ready</span>
        </div>
        <div id="toolbar-right">
            <span id="term-size"></span>
        </div>
    </div>

    <!-- xterm.js terminal -->
    <div id="terminal"></div>

    <!-- Status line -->
    <div id="statusline">
        <span id="sl-left"></span>
        <span id="sl-center"></span>
        <span id="sl-right">pty-claude</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0/lib/addon-fit.js"></script>
    <script src="terminal.js"></script>
</body>
</html>
